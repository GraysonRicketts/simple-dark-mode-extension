<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <button id="toggle">Toggle Dark Mode</button>
  <div id="intensity-control" class="hidden">
    <label for="intensity-slider">Intensity:</label>
    <div class="slider-row">
      <input type="range" id="intensity-slider" min="0" max="100" value="100" step="1">
      <span id="intensity-display">100%</span>
    </div>
  </div>
  <div id="url-list"></div>
  <script src="popup.js"></script>
</body>
</html>
